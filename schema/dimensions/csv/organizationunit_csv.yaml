default: &defaults
  dimension_name: "Organization Unit"
  csv_template:
    source: "schema/dimensions/csv_sources/organizationunit.csv"
    element_column: "code"
    parent_column: "parent_code"
    element_type_column: "element_type"
    attributes:
      - source: "description"
        target: "Description:s"
      - source: "country"
        target: "Country:s"
      - source: "currency"
        target: "Currency:s"
    mapping_steps:
      - method: "replace"
        columns: ["parent_code"]
        values:
          TOTAL: "All Organization Units"

bedrock_test_10000:
  <<: *defaults
