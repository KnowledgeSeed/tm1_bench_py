dev:
  name: "testbenchSales"
  dimensions: ["testbenchVersion","testbenchPeriod", "testbenchProduct","testbenchCustomer","testbenchKeyAccountManager","testbenchMeasureSales"]
  rules: [
    "SKIPCHECK;",
    "['Price'] = N: DB('testbenchPrice', !testbenchVersion, !testbenchProduct,!testbenchPeriod, 'Price');",
    "['Price'] = C: ['Revenue'] \\ ['Quantity'];",
    "['Revenue'] = N: ['Quantity'] * ['Price'];",
    "['Cost od Sold Goods'] = N: ['Revenue'] * DB('testbenchPrice', !testbenchVersion, !testbenchProduct,!testbenchPeriod, 'Production Cost Perc.');",
    "['Allocated Cost'] = N: ['Revenue'] * DB('testbenchPrice', !testbenchVersion, !testbenchProduct,!testbenchPeriod, 'Allocated Cost Perc.');",
    "['Transportation and Packaging Cost'] = N: ['Revenue'] * DB('testbenchPrice', !testbenchVersion, !testbenchProduct,!testbenchPeriod, 'Transportation and Packaging Perc.');",
    "['Margin'] = N: ['Revenue'] - ['Cost od Sold Goods'] - ['Allocated Cost'] - ['Transportation and Packaging Cost'];",
    "['Discount'] = N: ['Revenue'] * Db('testbenchDiscount', !testbenchVersion, !testbenchCustomer,!testbenchPeriod, 'Discount Perc.');",
    "['Discount Perc.'] = ['Discount'] \\ ['Revenue'];",
    "FEEDERS;",
    "['Quantity']=>['Revenue'],['Discount'],['Cost od Sold Goods'],['Allocated Cost'], ['Margin'];"
  ]