dev:
  - targetCube: "}ElementAttributes_testbenchAccount"
    rows:
        mdx: "{TM1FILTERBYLEVEL({TM1SUBSETALL([testbenchKeyAccountManager].[testbenchKeyAccountManager])}, 0)}"
    StatementType:
      method: "function"
      callable: _random_from_variable_list
      kwargs:
        reference: ${variables.account_type}
    Type:
      method: "function"
      callable: _random_from_variable_list
      kwargs:
        reference: ${variables.pnl_account_type}
    Sign:
      method: "function"
      callable: _look_up_based_on_column_value
      kwargs:
        referred_column: "Type"
        lookup_reference: ${variables.account_type.sign}