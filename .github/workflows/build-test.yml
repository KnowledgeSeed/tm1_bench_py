name: Build & Test
on:
  push:
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true

    steps:
    - name: Set up WireGuard
      uses: egor-tensin/setup-wireguard@v1
      with:
          endpoint: 80.77.112.226:55000
          endpoint_public_key: ${{ secrets.PFSENSE_PUBLIC_KEY }}
          ips: 192.168.124.90/24
          allowed_ips: 192.168.124.0/24, 192.168.123.0/24
          private_key: ${{ secrets.ENDPOINT_GITHUB_PRIVATE_KEY }}

    - name: Update resolv.conf
      run: |
          echo "nameserver 192.168.123.2" | sudo tee /etc/resolv.conf > /dev/null
          echo "nameserver 8.8.8.8" | sudo tee -a /etc/resolv.conf > /dev/null
          echo "search knowledgeseed.local" | sudo tee -a /etc/resolv.conf > /dev/null
    
    - name: Set up Docker with insecure registry
      run: |
        echo '{"insecure-registries": ["kseed-docker1.knowledgeseed.local:3000"]}' | sudo tee /etc/docker/daemon.json
        sudo systemctl restart docker
    
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt build
        python -m build
        pip install -e .

    - name: Validate schema (no TM1 required)
      run: |
        tm1-bench validate --schema ./schema --env default

    - name: Spin up TM1
      run: |
        PYPACKAGE=$(ls dist | grep .whl)
        cd tests_integration
        docker compose up -d 
        sleep 5

    - name: Run CLI build
      run: |
        tm1-bench build --schema ./schema --env default --connection testbench

    - name: Verify CLI version
      run: |
        tm1-bench --version
    
    - name: Stop docker containers
      if: always()
      run: |
        cd tests_integration
        docker compose down
