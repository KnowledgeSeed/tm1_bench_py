test_dataframe_find_and_replace:
  - dataframe:
      col1: [ "apple", "banana", "cherry", "apple" ]
      col2: [ 1, 2, 3, 1 ]
      col3: [ "x", "y", "z", "x" ]
    params:
      mapping:
        col1:
          apple: "APPLE"
          banana: "BANANA"
        col2:
          1: 100
          3: 300
    expected_dataframe:
      col1: [ "APPLE", "BANANA", "cherry", "APPLE" ]
      col2: [ 100, 2, 300, 100 ]
      col3: [ "x", "y", "z", "x" ]
  - dataframe:
      col1: [ "apple", "banana", "cherry", "apple" ]
      col2: [ 1, 2, 3, 1 ]
      col3: [ "x", "y", "z", "x" ]
    params:
      mapping:
        nonexistent_col: { 'apple': 'APPLE' }
    expected_dataframe:
      col1: [ "apple", "banana", "cherry", "apple" ]
      col2: [ 1, 2, 3, 1 ]
      col3: [ "x", "y", "z", "x" ]
  - dataframe:
      col1: [ "apple", "banana", "cherry", "apple" ]
      col2: [ 1, 2, 3, 1 ]
      col3: [ "x", "y", "z", "x" ]
    params:
      mapping:
        col1: {'orange': 'ORANGE'}
    expected_dataframe:
      col1: [ "apple", "banana", "cherry", "apple" ]
      col2: [ 1, 2, 3, 1 ]
      col3: [ "x", "y", "z", "x" ]
  - dataframe:
      col1: [ "apple", "banana", "cherry", "apple" ]
      col2: [ 1, 2, 3, 1 ]
      col3: [ "x", "y", "z", "x" ]
    params:
      mapping: {}
    expected_dataframe:
      col1: [ "apple", "banana", "cherry", "apple" ]
      col2: [ 1, 2, 3, 1 ]
      col3: [ "x", "y", "z", "x" ]

